<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMark Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
        }
        .redirect-card {
            text-align: center;
            padding: 40px;
        }
        .redirect-card h1 {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .redirect-card p {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .redirect-card a {
            color: #5865f2;
            text-decoration: none;
            font-size: 14px;
        }
        .redirect-card a:hover { color: #7c8af2; text-decoration: underline; }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #2a2a3e;
            border-top-color: #5865f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="spinner"></div>
        <h1>Opening Dashboard...</h1>
        <p>ClawMark settings have moved to the Dashboard website.</p>
        <a id="dashboard-link" href="https://labs.coco.xyz/clawmark/dash/">Click here if not redirected</a>
    </div>

    <script src="../config.js"></script>
    <script>
        'use strict';
        const dashUrl = (typeof ClawMarkConfig !== 'undefined' && ClawMarkConfig.DASHBOARD_URL)
            || 'https://labs.coco.xyz/clawmark/dash/';

        // Transfer hash from extension URL to dashboard URL
        const hash = location.hash.slice(1);
        const targetUrl = hash ? dashUrl + '#' + hash : dashUrl;

        document.getElementById('dashboard-link').href = targetUrl;

        // Auto-redirect
        window.location.href = targetUrl;
    </script>
</body>
</html>
