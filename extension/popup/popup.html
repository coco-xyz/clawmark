<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: 13px;
        }

        /* ---- Header ---- */

        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .master-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }

        .master-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .master-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #333;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .master-slider::before {
            content: '';
            position: absolute;
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .master-toggle input:checked + .master-slider {
            background: #5865f2;
        }

        .master-toggle input:checked + .master-slider::before {
            transform: translateX(16px);
            background: #fff;
        }

        .gear-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
        }

        .gear-btn:hover { color: #ccc; }

        /* ---- Disabled State ---- */

        .disabled-overlay {
            display: none;
            padding: 40px 20px;
            text-align: center;
            color: #555;
        }

        .disabled-overlay.visible { display: block; }

        .disabled-overlay .disabled-title {
            font-size: 15px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
        }

        .disabled-overlay .disabled-sub {
            font-size: 12px;
            color: #555;
        }

        /* ---- Main Content ---- */

        .main-content { display: block; }
        .main-content.hidden { display: none; }

        /* ---- Current Tab ---- */

        .current-tab {
            padding: 10px 16px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-icon { font-size: 14px; }

        .tab-url {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* ---- Delivery Targets ---- */

        .delivery-section {
            padding: 10px 16px;
            border-bottom: 1px solid #2a2a3e;
        }

        .delivery-label {
            font-size: 11px;
            color: #888;
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .target-list {
            max-height: 120px;
            overflow-y: auto;
        }

        .target-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #ccc;
            cursor: default;
        }

        .target-item:hover { background: rgba(255,255,255,0.04); }

        .target-item .target-star {
            color: #f59e0b;
            font-size: 12px;
        }

        .target-item .target-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .target-item .target-type {
            font-size: 10px;
            color: #666;
            padding: 1px 5px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
        }

        .target-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .target-footer button {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(88,101,242,0.15);
            color: #7c8af2;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .target-footer button:hover { background: rgba(88,101,242,0.3); color: #fff; }

        .no-targets {
            font-size: 12px;
            color: #555;
            padding: 6px 0;
        }

        /* ---- Annotation Stats ---- */

        .stats-section {
            padding: 10px 16px;
            border-bottom: 1px solid #2a2a3e;
        }

        .stats-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .stat-badge {
            font-size: 12px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-badge .count {
            font-weight: 600;
            color: #fff;
        }

        .recent-item {
            padding: 5px 0;
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-item .quote {
            color: #aaa;
        }

        .recent-item .time {
            color: #555;
            font-size: 10px;
            margin-left: 4px;
        }

        .view-all {
            font-size: 11px;
            color: #5865f2;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            padding: 4px 0;
        }

        .view-all:hover { color: #7c8af2; }

        /* ---- Empty State ---- */

        .empty-annotations {
            padding: 4px 0;
            font-size: 12px;
            color: #555;
        }

        .empty-hint {
            font-size: 11px;
            color: #444;
            margin-top: 2px;
        }

        /* ---- Site Toggle ---- */

        .site-section {
            padding: 8px 16px;
            border-bottom: 1px solid #2a2a3e;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .site-section.visible {
            display: flex;
        }

        .site-info {
            font-size: 11px;
            color: #888;
        }

        .site-btn {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.08);
            color: #aaa;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .site-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
        .site-btn.disabled-state { background: rgba(239,68,68,0.15); color: #ef4444; }
        .site-btn.disabled-state:hover { background: rgba(239,68,68,0.25); }

        /* ---- Quick Actions ---- */

        .actions-section {
            padding: 10px 16px;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255,255,255,0.06);
            color: #ccc;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ---- Not Logged In ---- */

        .login-prompt {
            display: none;
            padding: 24px 20px;
            text-align: center;
        }

        .login-prompt.visible { display: block; }

        .login-prompt .prompt-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 14px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 9px 12px;
            background: #fff;
            color: #3c4043;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .google-btn:hover { background: #f1f3f4; }

        .google-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        .settings-link {
            font-size: 11px;
            color: #5865f2;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }

        .settings-link:hover { color: #7c8af2; }

        /* ---- Message ---- */

        .message {
            padding: 6px 16px;
            font-size: 12px;
            text-align: center;
            min-height: 0;
        }

        .message.success { color: #22c55e; }
        .message.error { color: #ef4444; }

        /* ---- Update Banner ---- */

        .update-banner {
            display: none;
            padding: 8px 16px;
            background: rgba(88,101,242,0.12);
            border-bottom: 1px solid #2a2a3e;
            font-size: 12px;
            color: #e0e0e0;
        }

        .update-banner.visible { display: flex; align-items: center; gap: 8px; }

        .update-banner .update-text { flex: 1; }

        .update-banner .update-version {
            color: #7c8af2;
            font-weight: 600;
        }

        .update-banner .update-link {
            font-size: 11px;
            padding: 3px 10px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            white-space: nowrap;
        }

        .update-banner .update-link:hover { background: #4752c4; }

        .update-banner .update-dismiss {
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
        }

        .update-banner .update-dismiss:hover { color: #aaa; }
    </style>
</head>
<body>
    <!-- Header: Title + Master Toggle + Gear -->
    <div class="header">
        <div class="header-left">
            <h1>ClawMark</h1>
            <label class="master-toggle" title="Master toggle — enable/disable globally">
                <input type="checkbox" id="master-toggle" checked>
                <span class="master-slider"></span>
            </label>
        </div>
        <button class="gear-btn" id="gear-btn" title="Open Dashboard">&#x2699;</button>
    </div>

    <!-- Update banner -->
    <div class="update-banner" id="update-banner">
        <span class="update-text">New version <span class="update-version" id="update-version"></span> available</span>
        <a class="update-link" id="update-link" href="https://github.com/coco-xyz/clawmark/releases/latest" target="_blank" rel="noopener">Update</a>
        <button class="update-dismiss" id="update-dismiss" title="Dismiss">&times;</button>
    </div>

    <!-- Disabled state (master toggle OFF) -->
    <div class="disabled-overlay" id="disabled-overlay">
        <div class="disabled-title">ClawMark is paused</div>
        <div class="disabled-sub">Toggle the switch to re-enable</div>
    </div>

    <!-- Not logged in state -->
    <div class="login-prompt" id="login-prompt">
        <div class="prompt-text">Sign in to start annotating</div>
        <button class="google-btn" id="google-btn">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </button>
        <button class="settings-link" id="settings-link">Open Settings</button>
    </div>

    <!-- Main content (logged in + master ON) -->
    <div class="main-content" id="main-content">
        <!-- Current tab -->
        <div class="current-tab">
            <span class="tab-icon">&#x1f4c4;</span>
            <span class="tab-url" id="tab-url">Loading...</span>
        </div>

        <!-- Delivery targets -->
        <div class="delivery-section">
            <div class="delivery-label">&#x1f4ee; Deliver to:</div>
            <div class="target-list" id="target-list">
                <div class="no-targets" id="no-targets">No delivery targets configured</div>
            </div>
            <div class="target-footer">
                <button id="btn-more-targets">Manage rules</button>
            </div>
        </div>

        <!-- Annotation stats -->
        <div class="stats-section" id="stats-section">
            <div class="stats-row">
                <span class="stat-badge">&#x1f4ac; <span class="count" id="comment-count">0</span> Comments</span>
                <span class="stat-badge">&#x1f41b; <span class="count" id="issue-count">0</span> Issues</span>
            </div>
            <div id="recent-annotations"></div>
            <div class="empty-annotations" id="empty-annotations" style="display:none">
                No annotations yet
                <div class="empty-hint">Select text to start annotating</div>
            </div>
        </div>

        <!-- Site-specific toggle -->
        <div class="site-section" id="site-section">
            <span class="site-info" id="site-info"></span>
            <button class="site-btn" id="site-btn">Enabled</button>
        </div>

        <!-- Quick actions -->
        <div class="actions-section">
            <button class="action-btn" id="btn-screenshot">&#x1f4f7; Screenshot</button>
            <button class="action-btn" id="btn-panel">&#x1f4cb; Open Panel</button>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script src="../config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
