<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawMark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: 13px;
            min-height: 100vh;
        }

        /* ---- Header ---- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .header .refresh-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .header .refresh-btn:hover { color: #fff; }

        /* ---- Page Info ---- */
        .page-info {
            padding: 10px 16px;
            background: rgba(88, 101, 242, 0.08);
            border-bottom: 1px solid #2a2a3e;
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---- Tabs ---- */
        .tabs {
            display: flex;
            border-bottom: 1px solid #2a2a3e;
            padding: 0 16px;
        }

        .tab {
            padding: 10px 12px;
            cursor: pointer;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .tab:hover { color: #ccc; }
        .tab.active { color: #5865f2; border-bottom-color: #5865f2; }
        .tab.active[data-filter="errors"] { color: #ef4444; border-bottom-color: #ef4444; }

        .tab .count {
            margin-left: 4px;
            padding: 1px 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 10px;
        }

        .tab .count.has-errors { background: rgba(239, 68, 68, 0.25); color: #f87171; }

        /* ---- Content ---- */
        .content { padding: 12px 16px; }

        /* ---- Item Card ---- */
        .item-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .item-card:hover { border-color: #5865f2; }

        .item-card .item-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .item-card .item-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .item-card .item-type.issue { background: #dc2626; color: #fff; }
        .item-card .item-type.comment { background: #5865f2; color: #fff; }

        .item-card .item-priority {
            font-size: 10px;
            color: #888;
        }

        .item-card .item-priority.high { color: #f97316; }
        .item-card .item-priority.critical { color: #ef4444; }

        .item-card .item-title {
            font-weight: 500;
            color: #ddd;
            margin-bottom: 4px;
        }

        .item-card .item-quote {
            font-size: 12px;
            color: #888;
            border-left: 2px solid #333;
            padding-left: 8px;
            margin-bottom: 4px;
            max-height: 36px;
            overflow: hidden;
        }

        .item-card .item-source {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-card .item-source .source-icon { margin-right: 2px; }

        .item-card .item-source .source-link {
            color: #7c8aff;
            text-decoration: none;
        }

        .item-card .item-source .source-link:hover { text-decoration: underline; }

        .item-card .item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #666;
        }

        .item-card .item-tags {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .item-card .tag {
            padding: 1px 6px;
            background: rgba(88, 101, 242, 0.15);
            color: #8b9cf7;
            border-radius: 8px;
            font-size: 10px;
        }

        /* ---- Thread View ---- */
        .thread-view {
            display: none;
        }

        .thread-view.active {
            display: block;
        }

        .thread-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            color: #5865f2;
            cursor: pointer;
            font-size: 12px;
            border: none;
            background: none;
        }

        .thread-messages {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding: 8px 0;
        }

        .message {
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
        }

        .message.user { background: rgba(88, 101, 242, 0.1); }
        .message.assistant { background: rgba(34, 197, 94, 0.1); }

        .message .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .message .msg-content {
            color: #ddd;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .thread-reply {
            display: flex;
            gap: 8px;
            padding: 12px 0;
            border-top: 1px solid #2a2a3e;
            margin-top: 8px;
        }

        .thread-reply textarea {
            flex: 1;
            padding: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            min-height: 36px;
            outline: none;
        }

        .thread-reply textarea:focus { border-color: #5865f2; }

        .thread-reply button {
            padding: 8px 12px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            align-self: flex-end;
        }

        /* ---- Empty / Loading ---- */
        .empty {
            text-align: center;
            padding: 40px 16px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .error-msg {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 12px;
            margin: 8px 0;
        }

        /* ---- Dispatch Badges (#115) ---- */
        .dispatch-badges {
            display: flex;
            gap: 4px;
            margin: 4px 0;
        }

        .dispatch-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1.5px solid;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
        }

        .dispatch-details {
            margin-top: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a3e;
            border-radius: 6px;
        }

        .dispatch-details-label {
            font-size: 10px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .dispatch-detail-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            font-size: 12px;
        }

        .dispatch-detail-type { color: #ccc; }
        .dispatch-detail-status { font-size: 11px; }

        .dispatch-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 13px;
        }
        .dispatch-type-link {
            color: #5865f2;
            cursor: pointer;
        }
        .dispatch-type-link:hover {
            text-decoration: underline;
        }

        .dispatch-link:hover { text-decoration: underline; }

        .dispatch-retry-btn {
            display: block;
            margin-top: 6px;
            padding: 4px 10px;
            background: transparent;
            border: 1px solid #eab308;
            border-radius: 4px;
            color: #eab308;
            font-size: 11px;
            cursor: pointer;
        }
        .dispatch-retry-btn:hover { background: rgba(234, 179, 8, 0.1); }
        .dispatch-retry-btn:disabled { opacity: 0.5; cursor: default; }

        /* ---- Error Cards (#56) ---- */
        .error-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }

        .error-card:hover { border-color: #ef4444; }

        .error-card .error-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .error-severity {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .error-severity.error { background: #ef4444; }
        .error-severity.warning { background: #eab308; }

        .error-type-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .error-type-badge.warning {
            background: rgba(234, 179, 8, 0.15);
            color: #eab308;
        }

        .error-card .error-message {
            font-size: 12px;
            color: #ddd;
            margin-bottom: 4px;
            word-break: break-word;
            max-height: 40px;
            overflow: hidden;
        }

        .error-card .error-stack {
            font-size: 11px;
            color: #888;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            border-left: 2px solid #333;
            padding-left: 8px;
            margin-bottom: 4px;
            max-height: 32px;
            overflow: hidden;
            white-space: pre;
        }

        .error-card .error-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }

        .error-actions {
            display: flex;
            gap: 6px;
        }

        .error-action-btn {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid;
        }

        .error-action-btn.file-issue {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #f87171;
        }

        .error-action-btn.file-issue:hover { background: rgba(239, 68, 68, 0.2); }

        .error-action-btn.dismiss {
            background: transparent;
            border-color: #444;
            color: #888;
        }

        .error-action-btn.dismiss:hover { background: rgba(255,255,255,0.05); }

        .errors-toolbar {
            display: flex;
            justify-content: flex-end;
            padding: 6px 0;
            gap: 8px;
        }

        .errors-toolbar button {
            padding: 3px 8px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 4px;
            color: #888;
            font-size: 11px;
            cursor: pointer;
        }

        .errors-toolbar button:hover { color: #ccc; border-color: #666; }

        /* ---- Session Cards (#75) ---- */
        .session-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .session-card:hover { border-color: #5865f2; }

        .session-card .session-url {
            font-size: 12px;
            color: #ddd;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .session-card .session-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #666;
        }

        .session-card .session-meta .session-events {
            color: #5865f2;
        }

        .session-card .session-meta .session-errors {
            color: #ef4444;
        }

        .session-card .session-meta .session-snapshots {
            color: #22c55e;
        }

        .session-card .session-time {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .sessions-empty {
            text-align: center;
            padding: 40px 16px;
            color: #666;
        }

        .sessions-empty .sessions-empty-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        /* ---- Replay View (#75 Phase 2) ---- */
        .replay-view { display: none; }
        .replay-view.active { display: block; }

        .replay-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            color: #5865f2;
            cursor: pointer;
            font-size: 12px;
            border: none;
            background: none;
        }

        .replay-header {
            margin-bottom: 8px;
        }

        .replay-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .replay-url {
            font-size: 12px;
            color: #ddd;
            font-weight: 500;
        }

        .replay-stats {
            font-size: 11px;
            color: #888;
        }

        .replay-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }

        .replay-play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .replay-play-btn:hover { background: #4752c4; }

        .replay-time {
            font-size: 11px;
            color: #888;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            min-width: 80px;
        }

        .replay-speed-btn {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
            border: 1px solid #333;
            color: #ccc;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }

        .replay-speed-btn:hover { border-color: #5865f2; }

        .replay-timeline-track {
            position: relative;
            height: 32px;
            background: rgba(255,255,255,0.04);
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .replay-markers {
            position: absolute;
            inset: 0;
        }

        .replay-marker {
            position: absolute;
            top: 50%;
            width: 4px;
            height: 14px;
            transform: translate(-50%, -50%);
            border-radius: 2px;
            opacity: 0.7;
            cursor: pointer;
            z-index: 1;
        }

        .replay-marker:hover { opacity: 1; transform: translate(-50%, -50%) scaleY(1.3); }

        .replay-marker-click { background: #5865f2; }
        .replay-marker-input { background: #22c55e; }
        .replay-marker-scroll { background: rgba(255,255,255,0.15); height: 6px; }
        .replay-marker-navigation { background: #eab308; }
        .replay-marker-error { background: #ef4444 !important; height: 18px; opacity: 1; z-index: 2; }
        .replay-marker-snapshot { background: #8b5cf6; height: 8px; }

        .replay-playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 2px;
            background: #fff;
            z-index: 3;
            pointer-events: none;
            transition: left 0.05s linear;
        }

        .replay-event-detail {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .replay-detail-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #ddd;
        }

        .replay-detail-time {
            margin-left: auto;
            font-size: 11px;
            color: #888;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        }

        .replay-detail-close {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
        }

        .replay-detail-close:hover { color: #fff; }

        .replay-detail-body {
            font-size: 11px;
        }

        .replay-detail-field {
            display: flex;
            gap: 6px;
            padding: 2px 0;
            color: #ccc;
        }

        .replay-detail-field label {
            color: #888;
            min-width: 60px;
            flex-shrink: 0;
        }

        .replay-detail-field span {
            word-break: break-all;
        }

        .replay-event-list {
            max-height: calc(100vh - 340px);
            overflow-y: auto;
        }

        .replay-event-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.1s;
        }

        .replay-event-row:hover { background: rgba(255,255,255,0.04); }

        .replay-event-row.replay-event-active {
            background: rgba(88, 101, 242, 0.12);
            border-left: 2px solid #5865f2;
        }

        .replay-event-row.replay-event-error {
            color: #f87171;
        }

        .replay-event-row.replay-event-error:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        .replay-event-time {
            font-size: 10px;
            color: #666;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            min-width: 36px;
            flex-shrink: 0;
        }

        .replay-event-icon {
            font-size: 12px;
            flex-shrink: 0;
            width: 16px;
            text-align: center;
        }

        .replay-event-desc {
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .replay-event-error .replay-event-desc { color: #f87171; }

        .replay-loading, .replay-empty-events, .replay-error {
            text-align: center;
            padding: 24px 16px;
            color: #666;
            font-size: 12px;
        }

        .replay-error { color: #f87171; }

        /* ---- DOM Renderer (#75 Phase 3) ---- */
        .dom-renderer-wrapper {
            margin-bottom: 8px;
        }

        .dom-renderer-frame-container {
            position: relative;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .dom-renderer-iframe {
            width: 100%;
            height: 200px;
            border: none;
            display: block;
        }

        .dom-renderer-cursor {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(88, 101, 242, 0.8);
            border: 2px solid #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            display: none;
            transition: left 0.15s ease, top 0.15s ease;
        }

        .dom-renderer-click-ripple {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #5865f2;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9;
            opacity: 0;
        }

        .dom-renderer-click-ripple.active {
            animation: click-ripple 0.6s ease-out forwards;
        }

        @keyframes click-ripple {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        .dom-renderer-snapshot-info {
            font-size: 10px;
            color: #666;
            padding: 4px 8px;
            text-align: right;
        }

        .replay-dom-container {
            margin: 8px 0;
        }

        /* ---- Integration Polish (#75 Phase 4) ---- */

        /* Responsive: adjust iframe height for narrow panels */
        @media (max-width: 320px) {
            .dom-renderer-iframe { height: 150px; }
            .replay-controls { gap: 4px; }
            .replay-play-btn { width: 28px; height: 28px; font-size: 10px; }
            .replay-time { min-width: 60px; font-size: 10px; }
        }

        /* Loading spinner for replay view */
        .replay-loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            color: #888;
            gap: 12px;
        }

        .replay-loading-spinner::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #5865f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Session card hover feedback */
        .session-card:active { transform: scale(0.98); }

        /* Replay view transition */
        .replay-view.active {
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ClawMark</h1>
        <button class="refresh-btn" id="refresh" title="Refresh">&#x21BB;</button>
    </div>
    <div class="page-info" id="page-info">Loading...</div>

    <!-- List View -->
    <div id="list-view">
        <div class="tabs">
            <div class="tab active" data-filter="all">All <span class="count" id="count-all">0</span></div>
            <div class="tab" data-filter="comment">Comments <span class="count" id="count-comment">0</span></div>
            <div class="tab" data-filter="issue">Issues <span class="count" id="count-issue">0</span></div>
            <div class="tab" data-filter="errors">Errors <span class="count" id="count-errors">0</span></div>
            <div class="tab" data-filter="sessions">Sessions <span class="count" id="count-sessions">0</span></div>
        </div>
        <div class="content" id="items-container">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Sessions View -->
    <div id="sessions-view" style="display:none;">
        <div class="content" id="sessions-container">
            <div class="loading">Loading sessions...</div>
        </div>
    </div>

    <!-- Thread View -->
    <div id="thread-view" class="thread-view">
        <div class="content">
            <button class="thread-back" id="thread-back">&#x2190; Back</button>
            <div id="thread-header"></div>
            <div class="thread-messages" id="thread-messages"></div>
            <div class="thread-reply">
                <textarea id="reply-input" placeholder="Reply..." rows="1"></textarea>
                <button id="reply-submit">Send</button>
            </div>
        </div>
    </div>

    <!-- Replay View (#75 Phase 2) -->
    <div id="replay-view" class="replay-view">
        <div class="content">
            <button class="replay-back" id="replay-back">&#x2190; Back to sessions</button>
            <div id="replay-container"></div>
        </div>
    </div>

    <script src="dom-renderer.js"></script>
    <script src="replay-timeline.js"></script>
    <script src="panel.js"></script>
</body>
</html>
